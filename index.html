<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI藥品拍照辨識</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}


#cameraBox{

    position:relative;

    width:100vw;

    height:75vh;

    overflow:hidden;

    background:black;

}


video,
canvas{

    position:absolute;

    left:0;

    top:0;

    width:100%;

    height:100%;

}


video{

    object-fit:contain;

}


canvas{

    object-fit:contain;

}


button{

    margin:8px;

    padding:12px 25px;

    font-size:18px;

}


#count{

    font-size:26px;

    margin:15px;

}

</style>

</head>



<body>


<h2>
AI藥品拍照辨識
</h2>



<div id="cameraBox">


<video
id="video"
autoplay
playsinline>
</video>


<canvas id="canvas">
</canvas>


</div>



<div id="count">
藥品數量:0 顆
</div>



<button onclick="startCamera()">
開啟相機
</button>


<button onclick="capture()">
拍照辨識
</button>


<button onclick="resetCamera()">
重新拍攝
</button>





<script>


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;

let stream=null;

let locked=false;


const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");





async function loadModel(){


    session =
    await ort.InferenceSession.create(

        "model.onnx",

        {

            executionProviders:[
                "wasm"
            ]

        }

    );

}





async function startCamera(){


    if(!session)
        await loadModel();



    stream =
    await navigator.mediaDevices.getUserMedia({

        video:{

            facingMode:
            {
                ideal:
                "environment"
            },


            width:
            {
                ideal:1280
            },


            height:
            {
                ideal:720
            }

        },


        audio:false

    });



    video.srcObject=stream;



    video.onloadedmetadata=()=>{


        resizeCanvas();


    };


}







function resizeCanvas(){


    canvas.width =
    video.videoWidth;


    canvas.height =
    video.videoHeight;


}









// =======================
// 拍照定格
// =======================


async function capture(){


    if(locked)
        return;


    locked=true;



    resizeCanvas();



    // 完全依照原始比例複製

    ctx.drawImage(

        video,

        0,

        0,

        video.videoWidth,

        video.videoHeight,

        0,

        0,

        canvas.width,

        canvas.height

    );



    await detect();


}









// =======================
// 回到相機
// =======================


function resetCamera(){


    locked=false;


    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );


    document.getElementById("count")
    .innerHTML=
    "藥品數量:0 顆";


}









async function detect(){


    let img =
    document.createElement("canvas");


    img.width =
    canvas.width;


    img.height =
    canvas.height;



    let ictx =
    img.getContext("2d");


    ictx.drawImage(

        canvas,

        0,

        0

    );



    let result =
    await runAI(img);



    drawResult(result);


}









// =======================
// ONNX
// =======================


async function runAI(img){


    const size=640;



    let c =
    document.createElement("canvas");


    c.width=size;

    c.height=size;



    let cctx =
    c.getContext("2d");



    let scale =
    Math.min(

        size/img.width,

        size/img.height

    );



    let w =
    img.width*scale;


    let h =
    img.height*scale;



    let padX =
    (size-w)/2;


    let padY =
    (size-h)/2;



    cctx.fillStyle="black";

    cctx.fillRect(

        0,

        0,

        size,

        size

    );



    cctx.drawImage(

        img,

        padX,

        padY,

        w,

        h

    );



    let pix =
    cctx.getImageData(

        0,

        0,

        size,

        size

    );



    let input =
    new Float32Array(

        size*size*3

    );



    for(let i=0;i<size*size;i++){


        input[i]=
        pix.data[i*4]/255;


        input[i+size*size]=
        pix.data[i*4+1]/255;


        input[i+size*size*2]=
        pix.data[i*4+2]/255;


    }



    let tensor =
    new ort.Tensor(

        "float32",

        input,

        [

            1,

            3,

            640,

            640

        ]

    );



    let output =
    await session.run({

        [session.inputNames[0]]:
        tensor

    });



    return {

        output:
        output.output0,

        scale,

        padX,

        padY

    };


}









function drawResult(r){


    let data =
    r.output.data;



    let total=8400;



    let points=[];



    for(let i=0;i<total;i++){



        let score =
        data[i+total*4];



        if(score<0.65)
            continue;



        points.push({

            x:
            (data[i]-r.padX)/r.scale,


            y:
            (data[i+total]-r.padY)/r.scale,


            w:
            data[i+total*2]/r.scale,


            h:
            data[i+total*3]/r.scale,


            score

        });


    }



    points=nms(points,0.35);




    points.forEach(p=>{


        ctx.beginPath();


        ctx.arc(

            p.x,

            p.y,

            8,

            0,

            Math.PI*2

        );


        ctx.fillStyle="red";


        ctx.fill();


    });



    document.getElementById("count")
    .innerHTML=

    "藥品數量:"
    +
    points.length
    +
    " 顆";


}








function nms(boxes,t){


    boxes.sort(

        (a,b)=>
        b.score-a.score

    );


    let result=[];



    while(boxes.length){


        let best=
        boxes.shift();


        result.push(best);



        boxes=
        boxes.filter(

            b=>iou(best,b)<t

        );

    }


    return result;


}






function iou(a,b){


    let ax1=a.x-a.w/2;

    let ay1=a.y-a.h/2;

    let ax2=a.x+a.w/2;

    let ay2=a.y+a.h/2;


    let bx1=b.x-b.w/2;

    let by1=b.y-b.h/2;

    let bx2=b.x+b.w/2;

    let by2=b.y+b.h/2;



    let iw=Math.max(

        0,

        Math.min(ax2,bx2)
        -
        Math.max(ax1,bx1)

    );


    let ih=Math.max(

        0,

        Math.min(ay2,by2)
        -
        Math.max(ay1,by1)

    );


    let inter=iw*ih;


    return inter /

    (
        a.w*a.h+
        b.w*b.h-
        inter
    );

}



</script>


</body>

</html>
