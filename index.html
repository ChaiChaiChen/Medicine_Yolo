<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI藥品拍照辨識</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#box{
    position:relative;
    width:100vw;
    height:70vh;
}

video,canvas{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

canvas{
    pointer-events:none;
}

button{
    margin:10px;
    padding:12px 25px;
    font-size:18px;
}

#count{
    font-size:26px;
}

</style>

</head>


<body>


<h2>
AI藥品拍照辨識
</h2>


<div id="box">

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

</div>


<div id="count">
藥品數量:0 顆
</div>


<button onclick="startCamera()">
開啟相機
</button>


<button onclick="takePhoto()">
拍照辨識
</button>


<button onclick="stopCamera()">
關閉相機
</button>




<script>


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";


let session=null;

let stream=null;


const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");




async function loadModel(){

    session =
    await ort.InferenceSession.create(

        "model.onnx",

        {
            executionProviders:[
                "wasm"
            ]
        }

    );

}




async function startCamera(){


    if(!session)
        await loadModel();



    stream =
    await navigator.mediaDevices.getUserMedia({

        video:{
            facingMode:
            "environment"
        },

        audio:false

    });



    video.srcObject=stream;


    video.onloadedmetadata=()=>{


        canvas.width =
        video.videoWidth;


        canvas.height =
        video.videoHeight;


    };


}





function stopCamera(){


    if(stream){

        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );

    }

}






// =======================
// 拍照
// =======================


async function takePhoto(){


    let photo =
    document.createElement("canvas");


    photo.width =
    video.videoWidth;


    photo.height =
    video.videoHeight;



    let pctx =
    photo.getContext("2d");



    pctx.drawImage(

        video,

        0,

        0,

        photo.width,

        photo.height

    );



    await detect(photo);


}








// =======================
// YOLO輸入
// =======================


function preprocess(img){


    const size=640;



    let c =
    document.createElement("canvas");


    c.width=size;

    c.height=size;


    let cctx =
    c.getContext("2d");



    let scale =
    Math.min(

        size/img.width,

        size/img.height

    );



    let w =
    img.width*scale;


    let h =
    img.height*scale;



    let padX =
    (size-w)/2;


    let padY =
    (size-h)/2;



    cctx.fillStyle="black";

    cctx.fillRect(
        0,
        0,
        size,
        size
    );



    cctx.drawImage(

        img,

        padX,

        padY,

        w,

        h

    );



    let data =
    cctx.getImageData(

        0,

        0,

        size,

        size

    );



    let input =
    new Float32Array(

        size*size*3

    );



    for(
        let i=0;
        i<size*size;
        i++
    ){

        input[i]=
        data.data[i*4]/255;


        input[i+size*size]=
        data.data[i*4+1]/255;


        input[i+size*size*2]=
        data.data[i*4+2]/255;

    }



    return {

        tensor:
        new ort.Tensor(

            "float32",

            input,

            [
                1,
                3,
                size,
                size
            ]

        ),

        scale,

        padX,

        padY

    };


}









async function detect(img){


    let prep =
    preprocess(img);



    let result =
    await session.run({

        [session.inputNames[0]]:
        prep.tensor

    });



    drawResult(

        result.output0,

        prep.scale,

        prep.padX,

        prep.padY

    );


}









function drawResult(

output,

scale,

padX,

padY

){


    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );



    let data =
    output.data;



    let total=8400;


    let points=[];



    for(

        let i=0;

        i<total;

        i++

    ){


        let score =
        data[i+total*4];



        if(score<0.65)
            continue;



        let x =
        (data[i]-padX)/scale;


        let y =
        (data[i+total]-padY)/scale;



        points.push({

            x:x,

            y:y,

            w:data[i+total*2]/scale,

            h:data[i+total*3]/scale,

            score:score

        });


    }



    points =
    nms(points,0.35);




    points.forEach(p=>{


        ctx.beginPath();


        ctx.arc(

            p.x,

            p.y,

            8,

            0,

            Math.PI*2

        );


        ctx.fillStyle="red";


        ctx.fill();


    });



    document.getElementById("count")
    .innerHTML=

    "藥品數量:"
    +
    points.length
    +
    " 顆";


}








function nms(boxes,t){


    boxes.sort(

        (a,b)=>
        b.score-a.score

    );


    let result=[];



    while(boxes.length){


        let best =
        boxes.shift();


        result.push(best);



        boxes =
        boxes.filter(

            b=>iou(best,b)<t

        );

    }


    return result;


}





function iou(a,b){


    let ax1=a.x-a.w/2;

    let ay1=a.y-a.h/2;

    let ax2=a.x+a.w/2;

    let ay2=a.y+a.h/2;



    let bx1=b.x-b.w/2;

    let by1=b.y-b.h/2;

    let bx2=b.x+b.w/2;

    let by2=b.y+b.h/2;



    let iw=Math.max(

        0,

        Math.min(ax2,bx2)
        -
        Math.max(ax1,bx1)

    );


    let ih=Math.max(

        0,

        Math.min(ay2,by2)
        -
        Math.max(ay1,by1)

    );


    let inter=iw*ih;


    return inter/

    (
        a.w*a.h+
        b.w*b.h-
        inter
    );


}


</script>


</body>

</html>
