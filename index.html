<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI藥品拍照辨識</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>


<style>

body{
    margin:0;
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}


#cameraBox{

    position:relative;
    width:100vw;
    height:75vh;
    overflow:hidden;

}


video,canvas{

    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;

}


video{

    object-fit:cover;

}


canvas{

    pointer-events:none;

}


button{

    padding:12px 25px;
    margin:8px;
    font-size:18px;

}


#count{

    font-size:26px;
    margin:10px;

}


</style>

</head>


<body>


<h2>
AI藥品拍照辨識
</h2>


<div id="cameraBox">


<video id="video" autoplay playsinline></video>


<canvas id="canvas"></canvas>


</div>



<div id="count">
藥品數量:0 顆
</div>



<button onclick="startCamera()">
開啟相機
</button>


<button onclick="captureAndDetect()">
拍照辨識
</button>


<button onclick="retake()">
重新拍攝
</button>






<script>


ort.env.wasm.wasmPaths =
"https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/";



let session=null;

let stream=null;

let photoLocked=false;



const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const ctx =
canvas.getContext("2d");





async function loadModel(){


    session =
    await ort.InferenceSession.create(

        "model.onnx",

        {
            executionProviders:[
                "wasm"
            ]
        }

    );


}







async function startCamera(){


    if(!session){

        await loadModel();

    }



    if(stream)
        return;



    stream =
    await navigator.mediaDevices
    .getUserMedia({

        video:{
            facingMode:
            "environment"
        },

        audio:false

    });



    video.srcObject=stream;



    video.onloadedmetadata=()=>{


        canvas.width =
        video.videoWidth;


        canvas.height =
        video.videoHeight;


        ctx.clearRect(

            0,
            0,
            canvas.width,
            canvas.height

        );


    };


}








// ======================
// 拍照 + 定格 + AI
// ======================


async function captureAndDetect(){


    if(photoLocked)
        return;



    photoLocked=true;



    canvas.width =
    video.videoWidth;


    canvas.height =
    video.videoHeight;




    // 把目前畫面定格到canvas

    ctx.drawImage(

        video,

        0,

        0,

        canvas.width,

        canvas.height

    );



    await detectImage();


}









// ======================
// 重新拍攝
// ======================


function retake(){


    photoLocked=false;



    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );


    document.getElementById("count")
    .innerHTML=
    "藥品數量:0 顆";


}









async function detectImage(){


    let imgCanvas =
    document.createElement("canvas");


    imgCanvas.width =
    canvas.width;


    imgCanvas.height =
    canvas.height;



    let ictx =
    imgCanvas.getContext("2d");



    ictx.drawImage(

        canvas,

        0,

        0

    );



    let result =
    await runModel(imgCanvas);



    drawPoints(result);


}









// ======================
// ONNX
// ======================


async function runModel(img){


    const size=640;


    let temp =
    document.createElement("canvas");


    temp.width=size;

    temp.height=size;


    let tctx =
    temp.getContext("2d");



    let scale =
    Math.min(

        size/img.width,

        size/img.height

    );



    let w =
    img.width*scale;


    let h =
    img.height*scale;



    let padX =
    (size-w)/2;


    let padY =
    (size-h)/2;



    tctx.fillStyle="black";

    tctx.fillRect(

        0,

        0,

        size,

        size

    );



    tctx.drawImage(

        img,

        padX,

        padY,

        w,

        h

    );



    let data =
    tctx.getImageData(

        0,

        0,

        size,

        size

    );



    let input =
    new Float32Array(

        size*size*3

    );



    for(

        let i=0;

        i<size*size;

        i++

    ){

        input[i]=
        data.data[i*4]/255;


        input[i+size*size]=
        data.data[i*4+1]/255;


        input[i+size*size*2]=
        data.data[i*4+2]/255;


    }



    let tensor =
    new ort.Tensor(

        "float32",

        input,

        [

            1,

            3,

            size,

            size

        ]

    );



    let output =
    await session.run({

        [session.inputNames[0]]:
        tensor

    });



    return {

        output:
        output.output0,

        scale,

        padX,

        padY

    };


}









function drawPoints(result){


    let output =
    result.output;


    let scale =
    result.scale;


    let padX =
    result.padX;


    let padY =
    result.padY;



    // 清掉舊畫面後重新放回照片

    let img =
    canvas.toDataURL();



    let image =
    new Image();


    image.onload=()=>{


        ctx.drawImage(

            image,

            0,

            0

        );



        drawAI(

            output,

            scale,

            padX,

            padY

        );


    };


    image.src=img;



}









function drawAI(output,scale,padX,padY){



    let data =
    output.data;



    let total=8400;


    let points=[];



    for(

        let i=0;

        i<total;

        i++

    ){


        let score =
        data[i+total*4];



        if(score<0.65)
            continue;



        let x =
        (data[i]-padX)/scale;


        let y =
        (data[i+total]-padY)/scale;



        points.push({

            x,

            y,

            w:data[i+total*2]/scale,

            h:data[i+total*3]/scale,

            score

        });


    }



    points=nms(points,0.35);



    points.forEach(p=>{


        ctx.beginPath();


        ctx.arc(

            p.x,

            p.y,

            8,

            0,

            Math.PI*2

        );


        ctx.fillStyle="red";


        ctx.fill();


    });



    document.getElementById("count")
    .innerHTML=

    "藥品數量:"
    +
    points.length
    +
    " 顆";


}









function nms(boxes,t){


    boxes.sort(

        (a,b)=>
        b.score-a.score

    );



    let result=[];



    while(boxes.length){


        let best =
        boxes.shift();


        result.push(best);



        boxes =
        boxes.filter(

            b=>iou(best,b)<t

        );


    }



    return result;


}







function iou(a,b){


    let ax1=a.x-a.w/2;

    let ay1=a.y-a.h/2;

    let ax2=a.x+a.w/2;

    let ay2=a.y+a.h/2;



    let bx1=b.x-b.w/2;

    let by1=b.y-b.h/2;

    let bx2=b.x+b.w/2;

    let by2=b.y+b.h/2;



    let iw=Math.max(

        0,

        Math.min(ax2,bx2)
        -
        Math.max(ax1,bx1)

    );


    let ih=Math.max(

        0,

        Math.min(ay2,by2)
        -
        Math.max(ay1,by1)

    );


    let inter=iw*ih;



    return inter /

    (
        a.w*a.h+
        b.w*b.h-
        inter
    );


}


</script>


</body>

</html>
